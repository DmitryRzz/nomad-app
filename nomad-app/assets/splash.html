<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 33%, #ff9ff3 66%, #54a0ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .logo {
            font-size: 120px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        .title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 20px;
            color: rgba(255,255,255,0.9);
            margin-top: 12px;
            font-weight: 500;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="logo">🌍</div>
    <div class="title">NOMAD</div>
    <div class="subtitle">AI Travel Planner</div>
</body>
</html>
