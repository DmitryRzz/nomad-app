name: nomad_flutter_ui
description: "NOMAD AI Travel Planner — Phase 08: Launch"
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_riverpod: ^2.5.0
  google_maps_flutter: ^2.10.0
  geolocator: ^12.0.0
  flutter_sound: ^9.4.6
  path_provider: ^2.1.4
  camera: ^0.11.0
  sensors_plus: ^6.1.0
  # Phase 08 additions
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  connectivity_plus: ^6.1.0
  uni_links: ^0.5.1
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
